# ต้องมี block นี้ไม่งั้น Nginx จะไม่ทำงานครับ
events {
    worker_connections 1024;
}

http {
    # ── Rate limiting zones ──
    limit_req_zone $binary_remote_addr zone=login_limit:10m   rate=1r/s; 
    limit_req_zone $binary_remote_addr zone=api_limit:10m     rate=2r/s;

    # ── HTTP → HTTPS redirect ──
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS server ──
    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # ── Frontend ──
        location / {
            proxy_pass         http://frontend:80;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # ── Auth Service ──
        location /api/auth/ {
            proxy_pass         http://auth-service:3001; 
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # ── Task Service ──
        location /api/tasks {
            proxy_pass         http://task-service:3002;
            proxy_set_header   Host $host;
        }

        # ── Log Service ──
        location /api/logs/ {
            rewrite ^/api/logs(.*) /api/logs$1 break;

            proxy_pass         http://log-service:3003/api/logs/;
            
            # ส่งตั๋ว JWT ข้ามไปให้ Log Service
            proxy_set_header   Authorization $http_authorization; 
            proxy_pass_header  Authorization;
            
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── 429 Error ──
        error_page 429 /429.json;
        location = /429.json {
            return 429 '{"error":"Too Many Requests","retryAfter":10}';
            add_header Content-Type application/json;
        }
    }
}